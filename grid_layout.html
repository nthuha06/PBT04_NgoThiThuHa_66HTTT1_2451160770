<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="container">

        <header class="header">
            <h1>HOMEDI SHOP</h1>
        </header>

        <section class="hero">
            <h2>Big Sale 50%</h2>
            <p>Khuyến mãi cực lớn hôm nay</p>
        </section>

        <aside class="sidebar">

            <h3>Filters</h3>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Phone
            </label>

            <label>
                <input type="checkbox">
                Accessories
            </label>

        </aside>

        <main class="main-content">

            <div class="product-card featured">

                <img src="https://placehold.co/400x250">

                <h3>Featured Product</h3>

                <p>$999</p>

                <button>
                    Buy Now
                </button>

            </div>

            <div class="product-card">

                <img src="https://placehold.co/300x200">

                <h3>Product 2</h3>

                <p>$200</p>

                <button>
                    Buy Now
                </button>

            </div>

            <div class="product-card">

                <img src="https://placehold.co/300x200">

                <h3>Product 3</h3>

                <p>$300</p>

                <button>
                    Buy Now
                </button>

            </div>

            <div class="product-card">

                <img src="https://placehold.co/300x200">

                <h3>Product 4</h3>

                <p>$400</p>

                <button>
                    Buy Now
                </button>

            </div>

            <div class="product-card">

                <img src="https://placehold.co/300x200">

                <h3>Product 5</h3>

                <p>$500</p>

                <button>
                    Buy Now
                </button>

            </div>

            <div class="product-card">

                <img src="https://placehold.co/300x200">

                <h3>Product 6</h3>

                <p>$600</p>

                <button>
                    Buy Now
                </button>

            </div>

        </main>

        <aside class="ads">

            <h3>Advertisement</h3>

            <img src="https://placehold.co/200x400">

        </aside>

        <footer class="footer">
            © 2026 HOMEDI SHOP
        </footer>

    </div>

</body>
</html>
